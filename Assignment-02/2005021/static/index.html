<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Fingerprinting</title>
    <!-- Pico CSS - minimal CSS framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <!-- Alpine.js - minimal reactive framework -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .results-table {
            margin: 0 auto;
            width: 100%;
        }
        
        .heatmap-gallery {
            margin-top: 2rem;
        }
        
        .heatmaps-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(700px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .heatmap-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .stats {
            font-size: 1rem;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            margin-top: 0.8rem;
            border-radius: 4px;
        }
        
        .stats p {
            margin: 0;
            letter-spacing: 0.03em;
            font-family: monospace;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <main class="container" x-data="app()">
        <h1>CSE406: Website Fingerprinting</h1>
        
        <div class="button-group">
            <button @click="collectLatencyData()" :disabled="isCollecting">Collect latency data</button>
            <button @click="collectTraceData()" :disabled="isCollecting">Collect trace</button>
            <button @click="downloadTraces()" :disabled="traceData.length == 0">Download traces</button>
            <button>Refresh results</button>
            <button @click="clearResults()" :disabled="traceData.length == 0">Clear all results</button>
        </div>
        
        <div x-show="status" role="alert" x-text="status" 
             :class="{'alert-success': !statusIsError, 'alert-error': statusIsError}"></div>
        
        <!-- Latency Results Table -->
        <template x-if="latencyResults && !showingTraces">
            <div class="results-container">
                <h3>Latency Results</h3>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>N</th>
                            <th>Median Access Latency (ms)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(time, n) in latencyResults" :key="n">
                            <tr>
                                <td x-text="n"></td>
                                <td x-text="time.toFixed(2)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
        
        <!-- Heatmap gallery for all traces -->
        <template x-if="heatmaps.length > 0 && showingTraces">
            <div class="heatmap-gallery">
                <h3>Trace Heatmaps</h3>
                <div class="heatmaps-container">
                    <template x-for="(heatmap, index) in heatmaps" :key="heatmap.id">
                        <div class="heatmap-card">
                            <h4 x-text="'Trace #' + (index + 1) + ' - ' + heatmap.timestamp"></h4>
                            <img :src="'data:image/png;base64,' + heatmap.image" alt="Cache Access Heatmap" style="max-width: 100%;">
                            <div class="stats" x-show="heatmap.stats">
                                <p x-text="heatmap.stats"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <script src="index.js"></script>
    <script>
        // Initialize app by registering it as an Alpine data component
        document.addEventListener('alpine:init', () => {
            window.Alpine.data('app', app);
        });
        
        // Listen for Alpine being ready on the page
        document.addEventListener('alpine:initialized', () => {
            // Use a safe way to call fetchResults after Alpine is fully initialized
            setTimeout(() => {
                // Create a temporary event to run fetchResults on the component
                const event = new CustomEvent('fetch-results');
                document.dispatchEvent(event);
            }, 200);
        });
    </script>
</body>
</html>
